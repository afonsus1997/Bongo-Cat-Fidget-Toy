name: Build Firmware

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: sudo apt-get install -y gcc-arm-none-eabi ninja-build

      - name: Configure
        working-directory: Software/Bongo-cat-fidget-toy-cmake
        run: cmake --preset Release

      - name: Build
        working-directory: Software/Bongo-cat-fidget-toy-cmake
        run: cmake --build --preset Release
